<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>toosted.com</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <style>
        :root {
            --bg: #1a1b26;
            --fg: #a9b1d6;
            --primary: #7aa2f7;
            --success: #9ece6a;
            --warning: #e0af68;
            --error: #f7768e;
            --surface: #24283b;
            --surface-hover: #414868;
            --code-bg: #15161e;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Fira Code', 'Consolas', monospace;
            background-color: var(--bg);
            color: var(--fg);
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
            line-height: 1.6;
        }

        h1 {
            color: var(--primary);
            text-align: center;
            border-bottom: 2px solid var(--surface);
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }

        #problem-container {
            background-color: var(--surface);
            padding: 2.5rem;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.8rem;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .prompt-text {
            font-size: 1.2rem;
            color: var(--warning);
            margin-bottom: 1rem;
            display: block;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        button {
            background-color: var(--surface);
            color: var(--fg);
            border: 1px solid var(--surface-hover);
            padding: 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: bold;
            transition: all 0.2s;
        }

        button:hover:not(:disabled) {
            background-color: var(--surface-hover);
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        button.correct { background-color: var(--success); color: #1a1b26; border-color: var(--success); opacity: 1; }
        button.incorrect { background-color: var(--error); color: #1a1b26; border-color: var(--error); opacity: 1; }

        #feedback-panel {
            background-color: var(--surface);
            padding: 2rem;
            border-radius: 8px;
            border-left: 5px solid var(--primary);
            display: none;
            margin-bottom: 2rem;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .feedback-section {
            margin-bottom: 1.5rem;
            background: var(--code-bg);
            padding: 1rem;
            border-radius: 6px;
        }

        .feedback-section h3 {
            margin-top: 0;
            color: var(--primary);
            font-size: 1.1rem;
            border-bottom: 1px solid var(--surface-hover);
            padding-bottom: 0.5rem;
        }

        .checklist {
            list-style-type: none;
            padding-left: 0;
        }

        .checklist li {
            position: relative;
            padding-left: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .checklist li::before {
            content: "✓";
            color: var(--success);
            position: absolute;
            left: 0;
            font-weight: bold;
        }

        #next-btn {
            background-color: var(--primary);
            color: var(--bg);
            font-size: 1.2rem;
            padding: 1.2rem;
            display: none;
            width: 100%;
            margin-top: 1rem;
        }

        #next-btn:hover { background-color: #8db0f8; transform: none; }
    </style>
</head>
<body>

    <h1>AP Calc BC: Series Analysis Engine</h1>
    
    <div id="problem-container">
        </div>

    <div class="grid" id="options-grid">
        </div>

    <div id="feedback-panel">
        <h2 id="feedback-title" style="margin-top: 0;"></h2>
        <div id="feedback-content"></div>
        <button id="next-btn" onclick="loadNextProblem()">Execute Next Problem()</button>
    </div>

    <script>
        const categories = [
            "nth-Term Test", "Geometric Series", "p-Series Test", 
            "Integral Test", "Direct Comparison", "Limit Comparison", 
            "Alternating Series (AST)", "Ratio Test", "Root Test", 
            "Telescoping Series", "Alt. Series Error Bound", "Taylor Series Manipulation"
        ];

        // Advanced Database with FRQ Checklists and Exam Traps
        const problems = [
            {
                prompt: "Determine the convergence of:",
                series: "\\sum_{n=1}^{\\infty} \\frac{(-1)^n}{n}",
                correct: "Alternating Series (AST)",
                pattern: "The explicit presence of (-1)^n triggers AST immediately. The non-alternating component is just 1/n.",
                frqChecklist: [
                    "Define a_n = 1/n (the positive, non-alternating part).",
                    "State that a_n > 0 for all n >= 1.",
                    "Show a_{n+1} <= a_n to prove it is strictly decreasing.",
                    "Show \\lim_{n \\to \\infty} a_n = 0.",
                    "Conclude: 'Converges by the Alternating Series Test.'"
                ],
                traps: "CONDITIONAL CONVERGENCE TRAP! If asked 'Does this converge absolutely or conditionally?', you must state it converges conditionally because its absolute value form (1/n) is a divergent harmonic p-series.",
                customFails: {}
            },
            {
                prompt: "Find the Radius of Convergence for the Power Series:",
                series: "\\sum_{n=1}^{\\infty} \\frac{(x-3)^n}{n \\cdot 2^n}",
                correct: "Ratio Test",
                pattern: "Any time you have a Power Series (contains an 'x' raised to the nth power) mixed with other terms, you MUST use the Ratio Test to find the interior of the interval of convergence.",
                frqChecklist: [
                    "Set up the absolute value limit: \\lim_{n \\to \\infty} | \\frac{a_{n+1}}{a_n} |.",
                    "Simplify exponents and factorials carefully.",
                    "Set the resulting limit strictly less than 1: |x-3|/2 < 1.",
                    "Solve the inequality to find Radius R = 2."
                ],
                traps: "ENDPOINT TRAP! The Ratio Test tells you it converges on (1, 5), but the Ratio Test is INCONCLUSIVE at exactly x=1 and x=5. You must manually plug x=1 and x=5 back into the original series and test those specific series using AST or LCT.",
                customFails: {
                    "Root Test": "While there is an nth power, the isolated 'n' in the denominator makes the Root Test extremely messy here. Ratio is standard protocol for Power Series."
                }
            },
            {
                prompt: "What is the maximum error if we use the first 4 terms to approximate:",
                series: "\\sum_{n=1}^{\\infty} \\frac{(-1)^n}{n!}",
                correct: "Alt. Series Error Bound",
                pattern: "The prompt explicitly asks for an 'error' or 'remainder' of an alternating series. Do not test for convergence; use the error bound theorem.",
                frqChecklist: [
                    "Verify the series is alternating, decreasing, and converges to 0.",
                    "Identify the requested partial sum (S_4).",
                    "State the Alternating Series Error Bound theorem: |Error| <= |a_{n+1}|.",
                    "Calculate the magnitude of the 5th term: 1/5! = 1/120."
                ],
                traps: "Do not include the (-1)^n in your error bound answer. Error is a magnitude (absolute value). Also, ensure you are plugging in n=5, not n=4.",
                customFails: {
                    "Ratio Test": "The question isn't asking IF it converges (we know it does, it's e^-1). It's asking for the ERROR of a partial sum."
                }
            },
            {
                prompt: "Determine the convergence of:",
                series: "\\sum_{n=1}^{\\infty} \\frac{3n^2 - n}{n^5 + 4}",
                correct: "Limit Comparison",
                pattern: "It's a messy rational function (polynomial over polynomial). For large n, the lower-degree terms (-n and +4) don't matter. It behaves like 3n^2 / n^5.",
                frqChecklist: [
                    "Choose a known comparison series: b_n = 1/n^3.",
                    "State that b_n is a convergent p-series (p=3 > 1).",
                    "Set up the limit: \\lim_{n \\to \\infty} (a_n / b_n).",
                    "Show the limit equals a finite, positive constant (L = 3).",
                    "Conclude: 'By LCT, since the limit is finite and positive, both series converge.'"
                ],
                traps: "Do not use the Direct Comparison Test here. Proving that (3n^2 - n)/(n^5 + 4) is strictly less than 3/n^3 requires annoying algebra. LCT bypasses the inequality requirement.",
                customFails: {
                    "Direct Comparison": "DCT requires proving strict inequalities. Because of the -n in the numerator, proving it's smaller than your comparison series is algebraically brutal. Use LCT instead."
                }
            },
            {
                prompt: "Determine the convergence of:",
                series: "\\sum_{n=1}^{\\infty} \\frac{1}{n^2}",
                correct: "p-Series Test",
                pattern: "This is the textbook definition of a p-series: 1 / n^p where p is a constant.",
                frqChecklist: [
                    "Identify the series as a p-series.",
                    "Explicitly state the value of p (p = 2).",
                    "State the rule: 'Since p = 2 > 1, the series converges.'"
                ],
                traps: "INCONCLUSIVE TRAP! Many students default to the Ratio Test for everything. If you run the Ratio Test on 1/n^2, the limit is exactly 1. The Ratio Test fails completely here.",
                customFails: {
                    "Ratio Test": "Try it in your head: lim (n^2 / (n+1)^2) = 1. The Ratio Test is INCONCLUSIVE when L=1. You must recognize this as a p-series."
                }
            },
            {
                prompt: "Find the Maclaurin series for:",
                series: "f(x) = x^2 e^{3x}",
                correct: "Taylor Series Manipulation",
                pattern: "You are asked to generate a series for a function that is a modified version of a 'known' series (e^x). Do not build it from scratch using derivatives.",
                frqChecklist: [
                    "Write down the known Maclaurin series: e^x = \\sum x^n / n!.",
                    "Substitute 3x in for x: e^{3x} = \\sum (3x)^n / n!.",
                    "Multiply the entire series by x^2: x^2 \\sum (3^n x^n) / n!.",
                    "Combine the x terms: \\sum (3^n x^{n+2}) / n!."
                ],
                traps: "If you try to use the standard Taylor formula (taking the 1st, 2nd, 3rd derivatives of x^2 e^{3x}), the product rule will cause the derivatives to explode into a massive mess. Always substitute into known series.",
                customFails: {
                    "Ratio Test": "This is a generation problem, not a convergence problem. You need to manipulate a known series."
                }
            },
            {
                prompt: "Determine the convergence of:",
                series: "\\sum_{n=2}^{\\infty} \\frac{1}{n\\ln(n)}",
                correct: "Integral Test",
                pattern: "The function 1/(x ln x) is easily integrable using u-substitution (u = ln(x), du = 1/x dx).",
                frqChecklist: [
                    "Define f(x) = 1/(x ln x).",
                    "STATE THE 3 PREREQUISITES: f(x) must be continuous, positive, and decreasing on [2, \\infty).",
                    "Set up the improper integral with a limit: \\lim_{b \\to \\infty} \\int_2^b 1/(x ln x) dx.",
                    "Evaluate to ln(ln(b)). As b -> \\infty, the integral goes to infinity.",
                    "Conclude: 'Since the integral diverges, the series diverges by the Integral Test.'"
                ],
                traps: "FORGETTING THE PREREQUISITES! If you do the math perfectly but forget to write 'f(x) is positive, continuous, and decreasing', College Board will dock you a point on the FRQ.",
                customFails: {
                    "Limit Comparison": "What would you compare it to? 1/n diverges, but this is smaller than 1/n, so that tells you nothing. You must integrate."
                }
            }
        ];

        let currentProblemIndex = -1;
        let activeButtons = [];

        function init() {
            const grid = document.getElementById('options-grid');
            categories.forEach(test => {
                const btn = document.createElement('button');
                btn.innerText = test;
                btn.onclick = () => handleSelection(test, btn);
                grid.appendChild(btn);
                activeButtons.push(btn);
            });
            loadNextProblem();
        }

        function loadNextProblem() {
            activeButtons.forEach(btn => {
                btn.className = '';
                btn.disabled = false;
            });
            document.getElementById('feedback-panel').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';

            let newIndex = currentProblemIndex;
            while(newIndex === currentProblemIndex) {
                newIndex = Math.floor(Math.random() * problems.length);
            }
            currentProblemIndex = newIndex;
            
            const problem = problems[currentProblemIndex];
            
            const container = document.getElementById('problem-container');
            container.innerHTML = `<span class="prompt-text">${problem.prompt || "Determine the convergence of:"}</span><div id="math-render"></div>`;
            
            katex.render(problem.series, document.getElementById('math-render'), {
                displayMode: true,
                throwOnError: false
            });
        }

        function handleSelection(selectedTest, clickedBtn) {
            const problem = problems[currentProblemIndex];
            const feedbackPanel = document.getElementById('feedback-panel');
            const feedbackTitle = document.getElementById('feedback-title');
            const feedbackContent = document.getElementById('feedback-content');
            const nextBtn = document.getElementById('next-btn');

            activeButtons.forEach(btn => btn.disabled = true);
            feedbackPanel.style.display = 'block';

            let htmlContent = "";

            if (selectedTest === problem.correct) {
                clickedBtn.classList.add('correct');
                feedbackTitle.style.color = 'var(--success)';
                feedbackTitle.innerText = "System.out.println(\"Correct\"); // " + problem.correct;
                
                let checklistHTML = problem.frqChecklist.map(item => `<li>${item}</li>`).join('');
                
                htmlContent = `
                    <div class="feedback-section">
                        <h3>Pattern Recognition (MCQ Speed)</h3>
                        <p>${problem.pattern}</p>
                    </div>
                    <div class="feedback-section">
                        <h3>FRQ Written Protocol (Secure Full Marks)</h3>
                        <ul class="checklist">${checklistHTML}</ul>
                    </div>
                    <div class="feedback-section" style="border-left: 4px solid var(--warning);">
                        <h3 style="color: var(--warning);">⚠️ Exam Traps & Edge Cases</h3>
                        <p>${problem.traps}</p>
                    </div>
                `;
            } else {
                clickedBtn.classList.add('incorrect');
                const correctBtn = activeButtons.find(b => b.innerText === problem.correct);
                if(correctBtn) correctBtn.classList.add('correct');

                feedbackTitle.style.color = 'var(--error)';
                feedbackTitle.innerText = "Error: Invalid Method Selection.";
                
                let failReason = problem.customFails && problem.customFails[selectedTest] 
                    ? problem.customFails[selectedTest] 
                    : "This test does not align with the mathematical structure of the given series.";

                let checklistHTML = problem.frqChecklist.map(item => `<li>${item}</li>`).join('');

                htmlContent = `
                    <div class="feedback-section" style="border-left: 4px solid var(--error);">
                        <h3 style="color: var(--error);">Why ${selectedTest} fails here:</h3>
                        <p>${failReason}</p>
                    </div>
                    <div class="feedback-section">
                        <h3>The Optimal Path: ${problem.correct}</h3>
                        <p>${problem.pattern}</p>
                    </div>
                    <div class="feedback-section">
                        <h3>FRQ Written Protocol</h3>
                        <ul class="checklist">${checklistHTML}</ul>
                    </div>
                `;
            }

            feedbackContent.innerHTML = htmlContent;
            nextBtn.style.display = 'block';
            
            // Scroll to feedback
            feedbackPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        window.onload = init;
    </script>
</body>
</html>
